// Claudeからのテキスト形式: "朝食 | 鶏胸肉150g・玄米 | 480kcal P42g F8g C58g"
const parseMealText = (text) => {
  const results = [];
  const timeMap = { 朝食:"breakfast", 昼食:"lunch", 夕食:"dinner", 間食:"snack",
                    breakfast:"breakfast", lunch:"lunch", dinner:"dinner", snack:"snack" };
  const lines = text.trim().split("\n").filter(l => l.trim());
  for (const line of lines) {
    // 形式: 朝食 | 料理名 | 480kcal P42g F8g C58g
    const parts = line.split("|").map(s => s.trim());
    if (parts.length < 3) continue;
    const timeStr = parts[0];
    const name    = parts[1];
    const nums    = parts[2];
    const cal  = nums.match(/([\d.]+)\s*kcal/i);
    const prot = nums.match(/P\s*([\d.]+)\s*g/i);
    const fat  = nums.match(/F\s*([\d.]+)\s*g/i);
    const carb = nums.match(/C\s*([\d.]+)\s*g/i);
    if (!cal) continue;
    results.push({
      id: Date.now() + Math.random(),
      time: timeMap[timeStr] || "snack",
      name,
      calories: Math.round(parseFloat(cal[1])),
      protein:  Math.round(parseFloat(prot?.[1] || 0)),
      fat:      Math.round(parseFloat(fat?.[1]  || 0)),
      carbs:    Math.round(parseFloat(carb?.[1] || 0)),
    });
  }
  return results;
};

// ── テキストペースト → 体組成自動パース ──────────
const parseBodyText = (text) => {
  const n = (patterns) => {
    for (const p of patterns) {
      const m = text.match(p);
      if (m) return parseFloat(m[1]);
    }
    return null;
  };
  return {
    weight:      n([/体重[^\d]*?([\d.]+)\s*kg/i, /^([\d.]+)\s*kg/m]),
    fatPct:      n([/体脂肪率?[^\d]*?([\d.]+)/i, /fat[^\d]*([\d.]+)/i]),
    leanMass:    n([/除脂肪体?重?[^\d]*?([\d.]+)/i, /lean[^\d]*([\d.]+)/i]),
    muscleMass:  n([/筋肉量[^\d]*?([\d.]+)/i, /muscle\s*mass[^\d]*([\d.]+)/i]),
    visceralFat: n([/内臓脂肪[^\d]*?([\d]+)/i, /visceral[^\d]*([\d]+)/i]),
    water:       n([/体水分率?[^\d]*?([\d.]+)/i, /water[^\d]*([\d.]+)/i]),
    musclePct:   n([/骨格筋[^\d]*?([\d.]+)/i, /skeletal[^\d]*([\d.]+)/i]),
    subFat:      n([/皮下脂肪[^\d]*?([\d.]+)/i]),
    boneMass:    n([/骨量[^\d]*?([\d.]+)/i, /bone[^\d]*([\d.]+)/i]),
    proteinPct:  n([/タンパク質?[^\d]*?([\d.]+)/i, /protein[^\d]*([\d.]+)/i]),
    bmr:         n([/基礎代謝量?[^\d]*?([\d]+)/i, /bmr[^\d]*([\d]+)/i, /kcal[^\d]*([\d]+)/i]),
    bmi:         n([/bmi[^\d]*([\d.]+)/i]),
  };
};

const BodyPastePanel = ({ selectedDate, setData, hasBody }) => {
  const [open, setOpen]       = useState(false);
  const [text, setText]       = useState("");
  const [preview, setPreview] = useState(null);
  const [saved, setSaved]     = useState(false);

  // 日付が変わったらパネルをリセット
  useEffect(() => {
    setOpen(false);
    setText("");
    setPreview(null);
    setSaved(false);
  }, [selectedDate]);

  const handlePaste = (e) => {
    const pasted = e.clipboardData?.getData("text") || e.target.value;
    setText(pasted);
    const parsed = parseBodyText(pasted);
    const hasAny = Object.values(parsed).some(v => v !== null);
    setPreview(hasAny ? parsed : null);
    setSaved(false);
  };

  const handleChange = (e) => {
    setText(e.target.value);
    const parsed = parseBodyText(e.target.value);
    const hasAny = Object.values(parsed).some(v => v !== null);
    setPreview(hasAny ? parsed : null);
    setSaved(false);
  };

  const save = () => {
    if (!preview) return;
    const body = {};
    Object.entries(preview).forEach(([k,v]) => { if (v !== null) body[k] = v; });
    const newWeight = body.weight || null;
    const { weight: _w, ...bodyWithoutWeight } = body;
    setData(prev => {
      const day = prev[selectedDate] || { weight:null, training:false, body:null, meals:[] };
      return {
        ...prev,
        [selectedDate]: {
          ...day,
          meals: [...(day.meals||[])],
          weight: newWeight !== null ? newWeight : day.weight,
          body: { ...(day.body||{}), ...bodyWithoutWeight },
        }
      };
    });
    setSaved(true);
    setText("");
    setPreview(null);
    setTimeout(() => { setOpen(false); setSaved(false); }, 1200);
  };

  const labelMap = {
    weight:"体重", fatPct:"体脂肪率", leanMass:"除脂肪体重", muscleMass:"筋肉量",
    visceralFat:"内臓脂肪", water:"体水分率", musclePct:"骨格筋", subFat:"皮下脂肪",
    boneMass:"骨量", proteinPct:"タンパク質", bmr:"基礎代謝", bmi:"BMI",
  };
  const unitMap = {
    weight:"kg", fatPct:"%", leanMass:"kg", muscleMass:"kg",
    visceralFat:"", water:"%", musclePct:"%", subFat:"%",
    boneMass:"kg", proteinPct:"%", bmr:"kcal", bmi:"",
  };

  return (
    <div style={{ marginTop:10 }}>
      <button onClick={() => { setOpen(!open); setText(""); setPreview(null); setSaved(false); }}
        style={{ width:"100%", background:"rgba(255,255,255,0.04)", border:"1px dashed rgba(255,255,255,0.15)", borderRadius:10, padding:"10px 0", color:"rgba(255,255,255,0.45)", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>
        {open ? "▲ 閉じる" : `📋 ${hasBody ? "体組成を更新（テキスト貼付）" : "体組成を入力（テキスト貼付）"}`}
      </button>

      {open && (
        <div style={{ marginTop:10 }}>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", marginBottom:6, lineHeight:1.7 }}>
            このチャットで「今朝の体重」と送るとClaudeがテキストで返してくれます。<br/>それをそのままここに貼ってください📎
          </div>
          <textarea
            value={text}
            onChange={handleChange}
            onPaste={handlePaste}
            placeholder={"例:\n体重: 56.6kg\n体脂肪率: 24.5%\n筋肉量: 40.2kg\n除脂肪体重: 42.7kg\n内臓脂肪: 3\n体水分率: 51.8%\n基礎代謝: 1293kcal"}
            rows={6}
            style={{ width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:10, padding:"12px 14px", color:"#fff", fontSize:12, fontFamily:"'DM Mono',monospace", outline:"none", resize:"vertical", lineHeight:1.8 }}
          />

          {preview && (
            <div style={{ marginTop:10, background:"rgba(78,205,196,0.07)", border:"1px solid rgba(78,205,196,0.2)", borderRadius:10, padding:"12px 14px" }}>
              <div style={{ fontSize:10, color:"#4ecdc4", letterSpacing:1, textTransform:"uppercase", marginBottom:8 }}>✅ 読み取り結果</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"4px 16px" }}>
                {Object.entries(preview).filter(([,v])=>v!==null).map(([k,v]) => (
                  <div key={k} style={{ fontSize:12, color:"rgba(255,255,255,0.7)", display:"flex", justifyContent:"space-between" }}>
                    <span style={{ color:"rgba(255,255,255,0.4)" }}>{labelMap[k]}</span>
                    <span style={{ fontFamily:"'DM Mono',monospace", color:"#e8d5a3" }}>{v}{unitMap[k]}</span>
                  </div>
                ))}
              </div>
              <button onClick={save}
                style={{ width:"100%", marginTop:10, background: saved?"#4ecdc4":"#e8d5a3", color:"#0f0f13", border:"none", borderRadius:10, padding:"10px 0", cursor:"pointer", fontSize:13, fontWeight:700, fontFamily:"inherit", transition:"background 0.3s" }}>
                {saved ? "✓ 保存しました！" : "この内容で保存"}
              </button>
            </div>
          )}

          {text.length > 5 && !preview && (
            <div style={{ marginTop:8, fontSize:11, color:"#fb923c" }}>数値が読み取れませんでした。体重・体脂肪率などが含まれるテキストを貼ってください。</div>
          )}
        </div>
      )}
    </div>
  );
};


function App() {
  const [data, setData]               = useState(null);
  const [selectedDate, setSelectedDate] = useState(today());
  const [tab, setTab]                 = useState("today");
  const [input, setInput]             = useState("");
  const [mealTime, setMealTime]       = useState("lunch");
  const [mealInputMode, setMealInputMode] = useState("type");
  const [loading, setLoading]         = useState(false);
  const [weightInput, setWeightInput] = useState("");
  const [aiError, setAiError]         = useState(null);
  const [storageReady, setStorageReady] = useState(false);
  const [saveStatus, setSaveStatus]     = useState("");
  const [showGoalInfo, setShowGoalInfo]       = useState(false);
  const [showPhaseDetail, setShowPhaseDetail] = useState(false);

  // Image/advice states (advice can be set from chat context)
  const [advice, setAdvice] = useState(null);

  // Chat states
  const [chatMessages, setChatMessages] = useState([]);
  const [chatInput, setChatInput]       = useState("");
  const [chatLoading, setChatLoading]   = useState(false);
  const chatBottomRef = useRef(null);

  const inputRef    = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const r = await Promise.resolve({value: localStorage.getItem("health-tracker-data")});
        setData(r?.value ? JSON.parse(r.value) : JSON.parse(JSON.stringify(SAMPLE_DATA)));
      } catch { setData(JSON.parse(JSON.stringify(SAMPLE_DATA))); }
      setStorageReady(true);
    })();
  }, []);

  useEffect(() => {
    if (!storageReady || data===null) return;
    (async () => {
      try {
        await Promise.resolve(localStorage.setItem("health-tracker-data", JSON.stringify(data)));
        setSaveStatus("saved");
        setTimeout(() => setSaveStatus(""), 2000);
      } catch { setSaveStatus("error"); }
    })();
  }, [data, storageReady]);

  const exportData = () => {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `health-data-${today()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        setData(parsed);
        alert("データを復元しました！");
      } catch { alert("ファイルの読み込みに失敗しました。"); }
    };
    reader.readAsText(file);
  };

  // Auto-scroll chat — must be before early return
  useEffect(() => {
    if (tab === "chat") chatBottomRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [chatMessages, tab]);

  if (data===null) return (
    <div style={{ minHeight:"100vh", background:"#0f0f13", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12 }}>
      <div style={{ width:32, height:32, border:"3px solid rgba(255,255,255,0.1)", borderTop:"3px solid #e8d5a3", borderRadius:"50%", animation:"spin 0.8s linear infinite" }}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{ color:"rgba(255,255,255,0.3)", fontSize:13, fontFamily:"sans-serif" }}>読み込み中…</div>
    </div>
  );

  const dayData    = data[selectedDate] || { weight:null, training:false, body:null, meals:[] };
  const isTraining = dayData.training || false;
  const currentPhase = getPhase(selectedDate);
  const phaseCalories = currentPhase?.calorieOverride
    ? (isTraining ? currentPhase.calorieOverride.training : currentPhase.calorieOverride.rest)
    : null;
  const GOAL = {
    ...(isTraining ? GOALS.training : GOALS.rest),
    ...(phaseCalories ? { calories: phaseCalories } : {}),
  };
  const totals     = getMealTotals(dayData.meals);

  const weightHistory = Object.entries(data)
    .filter(([,d]) => d.weight)
    .sort(([a],[b]) => a.localeCompare(b))
    .map(([date,d]) => ({ date:date.slice(5), weight:d.weight, full:date }));
  const allDates = Object.keys(data).sort((a,b) => b.localeCompare(a));
  const avgWeight = weightHistory.length ? (weightHistory.reduce((s,d)=>s+d.weight,0)/weightHistory.length).toFixed(1) : null;
  const latestWeight = weightHistory.length ? weightHistory[weightHistory.length-1].weight : 56.75;
  const remaining = (latestWeight - TARGET_WEIGHT).toFixed(2);
  const days = daysUntilMatch();

  const toggleTraining = () => setData(prev => {
    const day = prev[selectedDate] || { weight:null, training:false, body:null, meals:[] };
    return { ...prev, [selectedDate]: { ...day, meals:[...(day.meals||[])], training:!day.training } };
  });

  const saveWeight = () => {
    const w = parseFloat(weightInput);
    if (!isNaN(w) && w > 0) {
      setData(prev => {
        const day = prev[selectedDate] || { weight:null, training:false, body:null, meals:[] };
        return { ...prev, [selectedDate]: { ...day, meals:[...(day.meals||[])], weight:w } };
      });
      setWeightInput("");
    }
  };

  // ── 食品データベース（ローカル推定） ──────────────
  const estimateNutrition = (text) => {
    const t = text.toLowerCase();
    const db = [
      { keys:["バナナ","banana"],         cal:90,  p:1,  f:0, c:23, name:"バナナ1本" },
      { keys:["キウイ","kiwi"],           cal:53,  p:1,  f:0, c:13, name:"キウイ1個" },
      { keys:["りんご","apple"],          cal:80,  p:0,  f:0, c:21, name:"りんご1個" },
      { keys:["オレンジ","orange"],       cal:60,  p:1,  f:0, c:15, name:"オレンジ1個" },
      { keys:["卵","egg","たまご"],       cal:75,  p:6,  f:5, c:1,  name:"ゆで卵1個" },
      { keys:["プロテイン","protein shake"],cal:120,p:25, f:1, c:3,  name:"プロテイン1杯" },
      { keys:["鶏胸肉","chicken breast"], cal:165, p:31, f:4, c:0,  name:"鶏胸肉150g" },
      { keys:["鶏むね","むね肉"],         cal:165, p:31, f:4, c:0,  name:"鶏むね肉150g" },
      { keys:["サーモン","salmon"],       cal:180, p:25, f:9, c:0,  name:"サーモン100g" },
      { keys:["豆腐","tofu"],             cal:80,  p:7,  f:4, c:2,  name:"豆腐150g" },
      { keys:["玄米","brown rice"],       cal:220, p:5,  f:2, c:46, name:"玄米1杯" },
      { keys:["白米","ご飯","rice"],      cal:250, p:4,  f:0, c:55, name:"白米1杯" },
      { keys:["オートミール","oats"],     cal:150, p:5,  f:3, c:27, name:"オートミール50g" },
      { keys:["ブロッコリー","broccoli"], cal:35,  p:3,  f:0, c:7,  name:"ブロッコリー100g" },
      { keys:["ほうれん草","spinach"],    cal:20,  p:2,  f:0, c:3,  name:"ほうれん草100g" },
      { keys:["ヨーグルト","yogurt"],     cal:100, p:10, f:0, c:14, name:"無脂肪ヨーグルト" },
      { keys:["味噌汁","みそ汁"],         cal:40,  p:3,  f:1, c:5,  name:"味噌汁1杯" },
      { keys:["プロテインバー","protein bar"],cal:200,p:20,f:6,c:22,name:"プロテインバー" },
      { keys:["サラダチキン"],            cal:110, p:22, f:2, c:0,  name:"サラダチキン" },
      { keys:["豚ヒレ","豚ひれ"],         cal:130, p:22, f:4, c:0,  name:"豚ヒレ100g" },
      { keys:["白身魚","たら","cod"],     cal:90,  p:20, f:1, c:0,  name:"白身魚100g" },
      { keys:["アボカド","avocado"],      cal:120, p:1,  f:11,c:6,  name:"アボカド半分" },
      { keys:["さつまいも","sweet potato"],cal:130,p:1,  f:0, c:31, name:"さつまいも100g" },
    ];
    // g指定があればグラム基準で計算、なければ個数・杯数で計算
    const gMatch = text.match(/(\d+)\s*g/i);
    const qtyMatch = text.match(/(\d+)\s*(個|本|杯|枚|切)/);
    const matched = db.filter(d => d.keys.some(k => t.includes(k)));
    if (!matched.length) {
      return { name: text.slice(0,30), calories:200, protein:10, fat:5, carbs:25 };
    }
    // 各食品のベース量（name末尾から推定）
    const getBaseG = (name) => {
      const m = name.match(/(\d+)g/);
      return m ? parseInt(m[1]) : null;
    };
    const calcItem = (d) => {
      const baseG = getBaseG(d.name);
      if (gMatch && baseG) {
        const scale = parseInt(gMatch[1]) / baseG;
        return { cal: d.cal*scale, p: d.p*scale, f: d.f*scale, c: d.c*scale };
      }
      const qty = qtyMatch ? parseInt(qtyMatch[1]) : 1;
      return { cal: d.cal*qty, p: d.p*qty, f: d.f*qty, c: d.c*qty };
    };
    const totals = matched.reduce((acc, d) => {
      const v = calcItem(d);
      return { cal: acc.cal+v.cal, p: acc.p+v.p, f: acc.f+v.f, c: acc.c+v.c };
    }, { cal:0, p:0, f:0, c:0 });
    const namePart = gMatch ? `${text.slice(0,20)}` : matched.map(d=>d.name).join("・");
    return {
      name: namePart,
      calories: Math.round(totals.cal),
      protein:  Math.round(totals.p),
      fat:      Math.round(totals.f),
      carbs:    Math.round(totals.c),
    };
  };

  // ── Meal submit ──────────────────────────────
  const submitMeal = () => {
    if (!input.trim()) return;
    setLoading(true); setAiError(null);

  // Build today's context string for AI

      : "フェーズ: 通常期";
    return `【本日の状況 (${selectedDate})】
体重: ${dayData.weight ?? "未記録"}kg ／ 目標: ${TARGET_WEIGHT}kg ／ 残り: ${remaining}kg ／ 試合まで${days}日
体組成: ${bodyInfo}
今日のモード: ${isTraining ? "練習あり（スパー1〜2時間）" : "休養日（デスクワーク）"}
${phaseInfo}
カロリー目標: ${GOAL.calories}kcal ／ 摂取済み: ${t.calories}kcal ／ 残り: ${Math.max(0, GOAL.calories - t.calories)}kcal
PFC目標: P${GOAL.protein}g F${GOAL.fat}g C${GOAL.carbs}g
PFC摂取済み: P${t.protein}g F${t.fat}g C${t.carbs}g ／ 残り: P${Math.max(0,GOAL.protein-t.protein)}g F${Math.max(0,GOAL.fat-t.fat)}g C${Math.max(0,GOAL.carbs-t.carbs)}g
食事記録:\n${mealLog}`;
  };

  const sendChat = async () => {
    const text = chatInput.trim();
    if (!text || chatLoading) return;
    const userMsg = { role:"user", content:text };
    setChatMessages(prev => [...prev, userMsg]);
    setChatInput("");
    setChatLoading(true);
    try {
      const history = [...chatMessages, userMsg].map(m => ({ role:m.role, content:m.content }));
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:600,
          system:`あなたはプロのスポーツ栄養士AIです。以下のユーザー情報を常に参照しながら会話してください。

【固定プロフィール】
- 40歳女性、キックボクシング選手
- 試合: ${MATCH_DATE} アンダー55kg階級
- 仕事: デスクワーク。練習日はスパー1〜2時間
- 脂質は最低35g以上（女性ホルモン維持のため）

${buildContext()}

【回答ルール】
- 日本語でフレンドリー＆専門的に
- 残りカロリー・PFCを必ず意識した提案をする
- 「何食べていい？」には具体的な食品名・量・タイミングを提示
- 食事評価は褒める点→改善点の順で
- 200字以内でコンパクトに。絵文字を自然に使う`,
          messages: history,
        }),
      });
      const json = await res.json();
      const reply = json.content?.map(c=>c.text||"").join("") || "エラーが発生しました";
      setChatMessages(prev => [...prev, { role:"assistant", content:reply }]);
    } catch {
      setChatMessages(prev => [...prev, { role:"assistant", content:"エラーが発生しました。もう一度試してください🙏" }]);
    }
    setChatLoading(false);

  return (

            <div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", marginTop:3 }}>3/22 アンダー55kg｜朝目標 {MORNING_TARGET}kg</div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:9, color:"rgba(255,255,255,0.4)", letterSpacing:1, textTransform:"uppercase", marginBottom:3 }}>残り減量</div>

                  {["このあと何食べていい？","今日の食事を評価して","夕食のおすすめは？","今日の食事は減量向き？","プロテイン追加していい？","間食は何がいい？"].map(q => (
                    <button key={q} onClick={()=>setChatInput(q)}
                      style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:20, padding:"6px 12px", color:"rgba(255,255,255,0.6)", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>
                      {q}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Messages */}
            <div style={{ flex:1, overflowY:"auto", display:"flex", flexDirection:"column", gap:10, paddingRight:2, paddingBottom:4 }}>
              {chatMessages.length === 0 && (
                <div style={{ textAlign:"center", padding:"30px 20px", color:"rgba(255,255,255,0.2)", fontSize:13, lineHeight:2.2 }}>
                  <div style={{ fontSize:32, marginBottom:8 }}>🥊</div>
                  栄養士AIに何でも相談してください<br/>
                  食事評価・次の食事提案・減量ペース確認など
                </div>
              )}
              {chatMessages.map((m, i) => (
                <div key={i} className="chat-msg" style={{ display:"flex", justifyContent:m.role==="user"?"flex-end":"flex-start", alignItems:"flex-start" }}>
                  {m.role==="assistant" && (
                    <div style={{ width:28, height:28, borderRadius:14, background:"linear-gradient(135deg,#4ecdc4,#a78bfa)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, flexShrink:0, marginRight:8, marginTop:2 }}>🥗</div>
                  )}
                  <div style={{
                    maxWidth:"80%", padding:"11px 14px",
                    borderRadius: m.role==="user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
                    background: m.role==="user" ? "rgba(232,213,163,0.12)" : "rgba(78,205,196,0.07)",
                    border: m.role==="user" ? "1px solid rgba(232,213,163,0.2)" : "1px solid rgba(78,205,196,0.18)",
                    fontSize:13, lineHeight:1.8, color:"rgba(255,255,255,0.88)", whiteSpace:"pre-wrap",
                  }}>
                    {m.content}
                  </div>
                </div>
              ))}
              {chatLoading && (
                <div className="chat-msg" style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <div style={{ width:28, height:28, borderRadius:14, background:"linear-gradient(135deg,#4ecdc4,#a78bfa)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13 }}>🥗</div>
                  <div style={{ background:"rgba(78,205,196,0.07)", border:"1px solid rgba(78,205,196,0.18)", borderRadius:"16px 16px 16px 4px", padding:"12px 16px", display:"flex", gap:5 }}>
                    {[0,1,2].map(i=>(
                      <div key={i} className="pulsing" style={{ width:6, height:6, borderRadius:3, background:"#4ecdc4", animationDelay:`${i*0.18}s` }}/>
                    ))}
                  </div>
                </div>
              )}
              <div ref={chatBottomRef}/>
            </div>

            {/* Input */}
            <div style={{ display:"flex", gap:8, marginTop:12, paddingTop:12, borderTop:"1px solid rgba(255,255,255,0.07)" }}>
              <input
                value={chatInput} onChange={e=>setChatInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()}
                placeholder="例: このあと何食べていい？"
                style={{ flex:1, background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:12, padding:"12px 14px", color:"#fff", fontSize:13, fontFamily:"inherit", outline:"none" }}
              />
              <button onClick={sendChat} disabled={chatLoading||!chatInput.trim()}
                style={{ background:chatLoading||!chatInput.trim()?"rgba(255,255,255,0.07)":"linear-gradient(135deg,#4ecdc4,#a78bfa)", color:chatLoading||!chatInput.trim()?"rgba(255,255,255,0.25)":"#0f0f13", border:"none", borderRadius:12, padding:"0 18px", cursor:chatLoading?"not-allowed":"pointer", fontSize:18, fontWeight:700, minWidth:50, flexShrink:0, transition:"all 0.2s" }}>
                ↑
              </button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
